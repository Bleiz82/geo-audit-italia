version: '3.8'

services:
  app:
    build: .
    container_name: geo-audit-italia
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./reports:/app/reports
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: geo-audit-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery:
    build: .
    container_name: geo-audit-celery
    command: celery -A backend.tasks worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
